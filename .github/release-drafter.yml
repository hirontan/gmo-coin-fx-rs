name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: '💥 Breaking Changes'
    labels: ['breaking', 'breaking-change']
  - title: '✨ Features'
    labels: ['feat', 'feature']
  - title: '🐛 Bug Fixes'
    labels: ['fix', 'bug']
  - title: '📦 Dependency Updates'
    labels: ['deps', 'dependencies']
  - title: '🧹 Chores'
    labels: ['chore', 'build']
  - title: '🔧 CI'
    labels: ['ci']
  - title: '📝 Documentation'
    labels: ['docs', 'documentation']

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels: ['breaking', 'breaking-change']
  minor:
    labels: ['feat', 'feature']
  patch:
    labels: ['fix', 'bug', 'chore', 'ci', 'build', 'docs', 'documentation', 'deps', 'dependencies']
  default: patch

template: |
  ## What's Changed

  $CHANGES

  ---

  ## Installation

  Add to your `Cargo.toml`:

  ### REST API Client
  ```toml
  [dependencies]
  gmo-coin-fx-client = { git = "https://github.com/$OWNER/$REPOSITORY.git", tag = "v$RESOLVED_VERSION" }
  ```

  ### WebSocket Client
  ```toml
  [dependencies]
  gmo-coin-fx-ws = { git = "https://github.com/$OWNER/$REPOSITORY.git", tag = "v$RESOLVED_VERSION" }
  ```

  ### Core Models Only
  ```toml
  [dependencies]
  gmo-coin-fx-core = { git = "https://github.com/$OWNER/$REPOSITORY.git", tag = "v$RESOLVED_VERSION" }
  ```

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
