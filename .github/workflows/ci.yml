name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  cargo-check:
    name: Cargo Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cargo check
        run: cargo check --all

      - name: Clippy
        run: cargo clippy --all -- -D warnings

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Test
        run: cargo test --all

  msrv-check:
    name: MSRV Check (Rust 1.86)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust 1.86 toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.86"

      - name: Cache cargo registry (MSRV)
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-msrv-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-msrv-

      - name: Cargo check on MSRV (--locked)
        # --locked: Cargo.lock に記載のバージョンを厳密に使用し、
        # 最新の依存バージョンが要求する Rust より高いバージョンを避ける
        run: cargo check --all --locked

  doc-check:
    name: Documentation Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-doc-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-doc-

      - name: Build docs (errors fail the job)
        run: cargo doc --no-deps --all
        env:
          RUSTDOCFLAGS: "-D warnings"

  batonel-check:
    name: Batonel Architectural Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install batonel
        run: |
          curl -fsSL https://raw.githubusercontent.com/Arcflect/batonel/main/scripts/install-batonel.sh \
            | bash -s -- v1.13.0
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: batonel verify (構造整合性チェック)
        run: batonel verify

      - name: batonel audit (PR ゲート用コンプライアンスチェック)
        run: batonel audit

      - name: batonel guard (サイドカー整合性チェック / warnings も失敗扱い)
        run: batonel guard --strict
